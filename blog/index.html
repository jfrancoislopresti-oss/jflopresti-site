
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Jean-François Lopresti</title>
<meta name="description" content="Articles sur l'acquisition digitale, le SEO, le GEO et l'optimisation de la conversion.">
<link rel="canonical" href="https://jflopresti.fr/blog/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060610;--bg2:#0a0a1a;--bg3:#0f0f25;--p1:#8b5cf6;--p2:#a855f7;--p3:#ec4899;--accent:#c084fc;--text:#f1f0ff;--muted:#7c7a9e;--border:rgba(139,92,246,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(139,92,246,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.025) 1px,transparent 1px);background-size:70px 70px;pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 4rem;background:rgba(6,6,16,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;background:linear-gradient(90deg,var(--p1),var(--p3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
.nav-back{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);text-decoration:none;letter-spacing:.1em;display:flex;align-items:center;gap:.5rem;transition:color .2s;}
.nav-back:hover{color:var(--accent);}
main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:8rem 4rem 6rem;}
.page-label{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.2rem;display:flex;align-items:center;gap:.8rem;}
.page-label::before{content:'';display:inline-block;width:32px;height:1px;background:linear-gradient(90deg,var(--p1),var(--p3));}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:800;letter-spacing:-.025em;margin-bottom:1rem;line-height:1.05;}
h1 span{background:linear-gradient(90deg,var(--p1),var(--p3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{font-size:1rem;color:var(--muted);margin-bottom:3rem;max-width:550px;line-height:1.7;}
.filters{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:2.5rem;}
.filter-btn{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1rem;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--p1);color:var(--accent);background:rgba(139,92,246,.08);}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;}
.blog-card{background:var(--bg3);border:1px solid var(--border);overflow:hidden;transition:border-color .3s,transform .3s;display:flex;flex-direction:column;opacity:0;transform:translateY(20px);animation:fadeIn .5s ease forwards;}
@keyframes fadeIn{to{opacity:1;transform:translateY(0);}}
.blog-card:hover{border-color:rgba(139,92,246,.3);transform:translateY(-3px);}
.blog-img{height:160px;background:linear-gradient(135deg,var(--bg2),var(--bg3));position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.5;}
.blog-meta{display:flex;gap:.8rem;align-items:center;padding:1.2rem 1.5rem .5rem;}
.blog-cat{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--accent);background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);padding:.2rem .6rem;}
.blog-date{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);}
.blog-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text);padding:.5rem 1.5rem .8rem;line-height:1.3;}
.blog-excerpt{font-size:.8rem;color:var(--muted);line-height:1.65;padding:0 1.5rem 1.2rem;flex:1;}
.blog-link{display:inline-flex;align-items:center;gap:.5rem;margin:auto 1.5rem 1.5rem;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--accent);text-decoration:none;letter-spacing:.08em;transition:gap .2s;}
.blog-link:hover{gap:.8rem;}
.empty{text-align:center;padding:5rem 2rem;color:var(--muted);grid-column:1/-1;}
.empty-ico{font-size:3rem;margin-bottom:1rem;opacity:.3;}
.hidden{display:none;}
@media(max-width:900px){nav{padding:1.1rem 1.5rem;}main{padding:6rem 1.5rem 4rem;}.blog-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.blog-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">JFL</a>
  <a href="/" class="nav-back">← Retour au site</a>
</nav>
<main>
  <div class="page-label">Blog</div>
  <h1>Acquisition & <span>conversion</span></h1>
  <p class="subtitle">Stratégies, méthodes et retours d'expérience sur l'acquisition digitale, le SEO, le GEO et l'optimisation de la conversion.</p>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">Tous</button>
    <button class="filter-btn" data-cat="SEO">SEO</button>
    <button class="filter-btn" data-cat="GEO">GEO</button>
    <button class="filter-btn" data-cat="CRO">CRO</button>
    <button class="filter-btn" data-cat="Acquisition">Acquisition</button>
    <button class="filter-btn" data-cat="Stratégie">Stratégie</button>
  </div>
  <div class="blog-grid" id="grid">
    <div class="empty"><div class="empty-ico">✍️</div><p>Les premiers articles arrivent bientôt.</p></div>
  </div>
</main>
<script>
fetch('/posts/index.json')
  .then(r => r.ok ? r.json() : [])
  .then(articles => {
    if (!articles || articles.length === 0) return;
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    articles.forEach((a, i) => {
      const card = document.createElement('article');
      card.className = 'blog-card';
      card.dataset.cat = a.category || 'SEO';
      card.style.animationDelay = (i * 0.08) + 's';
      const thumb = a.cover
        ? `<img src="${a.cover}" alt="${a.title}" style="width:100%;height:100%;object-fit:cover;">`
        : `<span style="font-size:3rem;opacity:.4;">${a.emoji || '📝'}</span>`;
      card.innerHTML = `
        <div class="blog-img">${thumb}</div>
        <div class="blog-meta">
          <span class="blog-cat">${a.category || 'SEO'}</span>
          <span class="blog-date">${a.date || ''}</span>
        </div>
        <h2 class="blog-title">${a.title}</h2>
        <p class="blog-excerpt">${a.excerpt || ''}</p>
        <a class="blog-link" href="${a.url || '#'}">Lire l'article →</a>`;
      grid.appendChild(card);
    });
    // Filtres
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.dataset.cat;
        document.querySelectorAll('.blog-card').forEach(card => {
          card.classList.toggle('hidden', cat !== 'all' && card.dataset.cat !== cat);
        });
      });
    });
  })
  .catch(() => {});
</script>
</body>
</html>
