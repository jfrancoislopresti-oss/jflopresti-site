
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Jean-François Lopresti</title>
<meta name="description" content="Articles simples sur la création de site, la visibilité sur Google et l'amélioration de votre présence digitale.">
<link rel="canonical" href="https://jflopresti.fr/blog/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFFFF;--bg2:#F7F6F4;--bg3:#F0EEE9;--accent:#C4622D;--accent-h:#A84E22;--accent-l:#F2E8E1;--text:#1A1A1A;--muted:#6B6B6B;--border:#E5E3DF;--shadow-h:0 6px 28px rgba(196,98,45,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 4rem;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent);text-decoration:none;}
.nav-back{font-size:.85rem;font-weight:500;color:var(--muted);text-decoration:none;transition:color .2s;}
.nav-back:hover{color:var(--accent);}
main{max-width:1100px;margin:0 auto;padding:8rem 4rem 6rem;}
.lbl{font-size:.72rem;font-weight:600;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:.7rem;}
.lbl::before{content:'';display:inline-block;width:28px;height:2px;background:var(--accent);border-radius:2px;}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,3rem);font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:.8rem;color:var(--text);}
h1 em{font-style:normal;color:var(--accent);}
.subtitle{font-size:1rem;color:var(--muted);margin-bottom:2.5rem;max-width:560px;line-height:1.7;}
.filters{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2.5rem;}
.filter-btn{font-size:.75rem;font-weight:600;padding:.45rem 1rem;background:transparent;border:1.5px solid var(--border);color:var(--muted);cursor:pointer;border-radius:20px;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
.blog-card{background:var(--bg2);border:1.5px solid var(--border);overflow:hidden;transition:border-color .25s,transform .25s;display:flex;flex-direction:column;text-decoration:none;color:inherit;border-radius:4px;}
.blog-card:hover{border-color:var(--accent);transform:translateY(-3px);}
.blog-img{width:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.blog-img img{width:100%;height:auto;display:block;}
.blog-img-placeholder{padding:2.5rem 0;font-size:1.5rem;color:var(--muted);opacity:.3;}
.blog-meta{display:flex;gap:.7rem;align-items:center;padding:1rem 1.3rem .4rem;}
.blog-cat{font-size:.65rem;font-weight:700;color:var(--accent);background:var(--accent-l);padding:.2rem .6rem;border-radius:20px;}
.blog-date{font-size:.65rem;color:var(--muted);}
h2.blog-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--text);padding:.4rem 1.3rem .7rem;line-height:1.3;}
.blog-excerpt{font-size:.8rem;color:var(--muted);line-height:1.65;padding:0 1.3rem 1rem;flex:1;}
.blog-link{display:inline-flex;align-items:center;gap:.4rem;margin:auto 1.3rem 1.3rem;font-size:.78rem;font-weight:600;color:var(--accent);}
.empty{text-align:center;padding:5rem 2rem;color:var(--muted);grid-column:1/-1;}
.hidden{display:none;}
footer{padding:2rem 4rem;border-top:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.ft-copy{font-size:.72rem;color:var(--muted);}
.ft-logo{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;color:var(--accent);}
@media(max-width:900px){nav{padding:1rem 1.5rem;}main{padding:6rem 1.5rem 4rem;}.blog-grid{grid-template-columns:1fr;}footer{padding:2rem 1.5rem;flex-direction:column;text-align:center;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">JFL</a>
  <a href="/" class="nav-back">← Retour à l'accueil</a>
</nav>
<main>
  <div class="lbl">Blog</div>
  <h1>Conseils & <em>ressources</em></h1>
  <p class="subtitle">Des articles simples pour comprendre comment développer votre activité en ligne, trouver plus de clients et améliorer votre site.</p>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">Tous</button>
    <button class="filter-btn" data-cat="Être visible sur Google">Être visible sur Google</button>
    <button class="filter-btn" data-cat="Améliorer son site">Améliorer son site</button>
    <button class="filter-btn" data-cat="Trouver des clients">Trouver des clients</button>
    <button class="filter-btn" data-cat="Développer son activité">Développer son activité</button>
  </div>
  <div class="blog-grid" id="grid">
    <div class="empty"><p>Les premiers articles arrivent bientôt.<br>Revenez dans quelques jours !</p></div>
  </div>
</main>
<footer>
  <div class="ft-copy">© 2025 Jean-François Lopresti</div>
  <div class="ft-logo">JFL</div>
</footer>
<script>
fetch('/posts/index.json').then(r=>r.ok?r.json():[]).then(articles=>{
  if(!articles||articles.length===0)return;
  const grid=document.getElementById('grid');grid.innerHTML='';
  articles.forEach((a,i)=>{
    const card=document.createElement('a');
    card.href=a.url||'#';
    card.className='blog-card';
    card.dataset.cat=a.category||'';
    card.style.animationDelay=(i*.08)+'s';
    const thumb=a.cover?`<img src="${a.cover}" alt="${a.title}" style="width:100%;height:auto;display:block;">`:`<div class="blog-img-placeholder"></div>`;
    card.innerHTML=`<div class="blog-img">${thumb}</div><div class="blog-meta"><span class="blog-cat">${a.category||'Conseils'}</span><span class="blog-date">${a.date||''}</span></div><h2 class="blog-title">${a.title}</h2><p class="blog-excerpt">${a.excerpt||''}</p><span class="blog-link">Lire l'article →</span>`;
    grid.appendChild(card);
  });
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const cat=btn.dataset.cat;
      document.querySelectorAll('.blog-card').forEach(c=>{c.classList.toggle('hidden',cat!=='all'&&c.dataset.cat!==cat);});
    });
  });
}).catch(()=>{});
</script>
</body>
</html>
